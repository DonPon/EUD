{% extends "base.html" %}

{% block title %}Client List - EUD Manager{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center bg-white">
                <h5 class="mb-0">Client Registry</h5>
                {% if user.role != 'VIEWER' %}
                    <a href="{% url 'generic-add' table_name='client' %}" class="btn btn-success btn-sm">+ New Client</a>
                {% endif %}
            </div>
            <div class="card-body">
                <table id="client-table" class="table table-striped table-bordered w-100">
                    <thead>
                        <tr>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>BR Number</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function() {
        const columns = [
            { data: 'first_name' },
            { data: 'last_name' },
            { data: 'br_number' },
            { 
                data: 'status',
                render: function(data) {
                    const badgeClass = data === 'active' ? 'bg-success' : 'bg-secondary';
                    return `<span class="badge ${badgeClass}">${data}</span>`;
                }
            },
            {
                data: 'client_uuid',
                orderable: false,
                render: function(data) {
                    return `<a href="/clients/${data}/" class="btn btn-primary btn-sm">View Details</a>`;
                }
            }
        ];

        initDataTable('#client-table', '/api/table/client/', columns);
    });
</script>
{% endblock %}
