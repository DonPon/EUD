{% extends 'base.html' %}

{% block title %}Dashboard - EUD Manager{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Bot Dashboard</h1>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4" id="bot-list-container">
        {% include 'dashboard_bots/_bot_list.html' %}
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function() {
        setInterval(function() {
            $.ajax({
                url: "{% url 'dashboard:bots_partial' %}",
                type: 'GET',
                success: function(data) {
                    $('#bot-list-container').html(data);
                },
                error: function(xhr, status, error) {
                    console.error("Error fetching bot data:", error);
                }
            });
        }, 10000); // Poll every 10 seconds
    });
</script>
{% endblock %}

{% block extra_css %}
<style>
    .card {
        transition: transform 0.2s ease-in-out;
        box-shadow: 0 4px 6px rgba(0,0,0,.1);
    }
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 15px rgba(0,0,0,.1);
    }
    .card-title {
        font-weight: 700;
        color: #333;
    }
    .badge {
        font-size: 0.9rem;
        padding: 0.5em 0.8em;
    }
</style>
{% endblock %}
