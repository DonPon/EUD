{% for bot in bots %}
<div class="col">
    <div class="card h-100">
        <div class="card-body d-flex flex-column">
            <h5 class="card-title">{{ bot.name }}</h5>
            <p class="card-text text-muted mb-3">{{ bot.description|default:"No description available." }}</p>
            <div class="mt-auto">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="badge {% if bot.status == 'Running' %}bg-success{% else %}bg-secondary{% endif %}">
                        {{ bot.status }}
                    </span>
                </div>
                <a href="{% url 'dashboard:bot_details' bot.name %}" class="btn btn-primary w-100">View Details</a>
            </div>
        </div>
    </div>
</div>
{% empty %}
<div class="col-12 text-center">
    <div class="alert alert-info">No bots found in the database.</div>
</div>
{% endfor %}
