{% extends "base.html" %}

{% block title %}User Management - EUD Manager{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center bg-white">
                <h5 class="mb-0">User Accounts</h5>
                <a href="{% url 'generic-add' table_name='user' %}" class="btn btn-ubs btn-sm">+ Add New User</a>
            </div>
            <div class="card-body">
                <table id="user-table" class="table table-striped table-bordered w-100">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Staff</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function() {
        const columns = [
            { data: 'username' },
            { data: 'email' },
            { 
                data: 'role',
                render: function(data) {
                    let badgeClass = 'bg-secondary';
                    if (data === 'ADMIN') badgeClass = 'bg-danger';
                    else if (data === 'EDITOR') badgeClass = 'bg-warning text-dark';
                    return `<span class="badge ${badgeClass}">${data}</span>`;
                }
            },
            { 
                data: 'is_active',
                render: function(data) {
                    return data ? '<span class="text-success">Active</span>' : '<span class="text-danger">Inactive</span>';
                }
            },
            { 
                data: 'is_staff',
                render: function(data) {
                    return data ? '<span class="text-primary">Staff</span>' : '<span class="text-muted">No</span>';
                }
            },
            {
                data: 'id',
                orderable: false,
                render: function(data) {
                    return `
                        <div class="btn-group">
                            <a href="/api/gui/user/${data}/edit/" class="btn btn-outline-ubs btn-sm">Edit</a>
                        </div>
                    `;
                }
            }
        ];

        initDataTable('#user-table', '/api/table/user/', columns);
    });
</script>
{% endblock %}
