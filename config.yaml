# EUD Django Application Configuration

# Database configuration
DATABASE_TYPE:
    - 'sqlite'  # Options: 'postgres' or 'sqlite'

# PostgreSQL cluster configuration (used by Database_Config)
certs_path:
    - '/path/to/certs'  # Path to the FOLDER to SSL certificates
db_env:
    - 'te2'  # Environment: 'te2', 'prod'
schema:
    - 'public'  # Database schema

sqlite_path:
    - '/path/to/db.sqlite3'  # Path to the SQLite database file (used if DATABASE_TYPE is 'sqlite')

media_path: '/path/to/media'  # Path to the media folder